<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aranäs VM-Tips</title>
    <meta
      name="description"
      content="Anmäl dig till Aranäs VM-Tips med namn, e-post och telefon."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="signup-panel" aria-labelledby="page-title">
        <div class="brand-block">
          <div class="tournament-mark" aria-hidden="true">
            <span>VM</span>
          </div>
          <p class="eyebrow">Aranäs</p>
          <h1 id="page-title">Anmälan till VM-Tips</h1>
          <p class="intro">
            Fyll i dina uppgifter så skickas din anmälan direkt till
            tipsaranas@gmail.com.
          </p>
        </div>

        <form
          class="signup-form"
          action="https://formsubmit.co/c6a290718084f72919944045915bba5e"
          method="POST"
        >
          <input type="hidden" name="_subject" value="Ny anmälan till Aranäs VM-Tips">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_captcha" value="false">
          <input type="text" name="_honey" class="honey-field" tabindex="-1" autocomplete="off">

          <label for="name">Namn</label>
          <input
            id="name"
            name="Namn"
            type="text"
            autocomplete="name"
            placeholder="Ditt namn"
            required
          >

          <label for="email">E-post</label>
          <input
            id="email"
            name="E-post"
            type="email"
            autocomplete="email"
            placeholder="namn@example.com"
            required
          >

          <label for="phone">Telefon</label>
          <input
            id="phone"
            name="Telefon"
            type="tel"
            autocomplete="tel"
            inputmode="tel"
            placeholder="070-123 45 67"
            required
          >

          <button type="submit">Skicka anmälan</button>

          <p class="form-note" role="status">
            Första skickade testet behöver bekräftas i mottagarens inkorg.
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
